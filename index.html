<!DOCTYPE html>
<html>
<head>
  <title>Date Planner 😏</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      text-align: center;
      width: 90%;
      max-width: 400px;
      animation: popIn 0.6s ease;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      margin: 8px;
      font-size: 15px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: #ff6b81;
      color: white;
      transition: transform 0.2s, background 0.2s;
    }

    button:hover {
      transform: scale(1.1);
      background: #ff4757;
    }

    button:active {
      transform: scale(0.95);
    }

    #noBtn {
      position: absolute;
      background: #888;
    }

    .slide-out {
      animation: slideOut 0.4s forwards;
    }

    .slide-in {
      animation: slideIn 0.4s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes slideOut {
      to { transform: translateX(-50px); opacity: 0; }
    }

    @keyframes slideIn {
      from { transform: translateX(50px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .final-text {
      font-size: 18px;
      line-height: 1.5;
      animation: popIn 0.6s ease;
    }
  </style>
</head>

<body>

<div class="card" id="card">
  <h1 id="question">Where should we go on a date? 😌</h1>
  <div id="options"></div>
</div>

<script>

let answers = {};
const card = document.getElementById("card");

function transition(next) {
  card.classList.add("slide-out");
  setTimeout(() => {
    next();
    card.classList.remove("slide-out");
    card.classList.add("slide-in");
    setTimeout(() => card.classList.remove("slide-in"), 400);
  }, 300);
}

// MAIN OPTIONS
function showMainOptions() {
  document.getElementById("question").innerText = "Where should we go on a date? 😌";
  document.getElementById("options").innerHTML = `
    <button onclick="chooseMain('Drunk Bowling')">Drunk Bowling 🎳</button>
    <button onclick="chooseMain('Drive')">Drive 🚗</button>
    <button onclick="chooseMain('Restobar')">Restobar 🍸</button>
    <br><br>
    <button id="noBtn">No date ❌</button>
  `;
  moveNoButton();
}

// RUNAWAY BUTTON
function moveNoButton() {
  const btn = document.getElementById("noBtn");
  btn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    btn.style.left = x + "px";
    btn.style.top = y + "px";
  });
}

// MAIN
function chooseMain(choice) {
  answers.main = choice;
  transition(() => {
    if (choice === "Drunk Bowling") showDrinkOptions();
    else if (choice === "Drive") showDriveOptions();
    else showTimeOptions();
  });
}

// DRINK
function showDrinkOptions() {
  document.getElementById("question").innerText = "Pick your drink 🍹";
  document.getElementById("options").innerHTML = `
    <button onclick="chooseDrink('Smirnoff Green Apple + Sprite')">Smirnoff Green Apple + Sprite 🍏</button>
    <button onclick="chooseDrink('Coconut water + Gin')">Coconut water + Gin 🥥</button>
  `;
}

function chooseDrink(choice) {
  answers.drink = choice;
  transition(showBowlingPlace);
}

// BOWLING
function showBowlingPlace() {
  document.getElementById("question").innerText = "Where are we bowling? 🎳";
  document.getElementById("options").innerHTML = `
    <button onclick="chooseBowling('The Grid Gaming Arena')">The Grid Gaming Arena</button>
    <button onclick="chooseBowling('Mall of Asia')">Mall of Asia</button>
  `;
}

function chooseBowling(choice) {
  answers.place = choice;
  transition(showTimeOptions);
}

// DRIVE
function showDriveOptions() {
  document.getElementById("question").innerText = "Where are we driving? 🚗";
  document.getElementById("options").innerHTML = `
    <button onclick="chooseDrive('Manchanabele')">Manchanabele 🌄</button>
    <button onclick="chooseDrive('Rasta Cafe')">Rasta Cafe ☕</button>
  `;
}

function chooseDrive(choice) {
  answers.place = choice;
  transition(showTimeOptions);
}

// TIME
function showTimeOptions() {
  document.getElementById("question").innerText = "Pick a time ⏰";
  document.getElementById("options").innerHTML = `
    <button onclick="chooseTime('Sunday Night')">Sunday Night 🌙</button>
    <button onclick="chooseTime('Monday Night')">Monday Night 🌙</button>
  `;
}

function chooseTime(choice) {
  answers.time = choice;
  transition(showFinal);
}

// FINAL
function showFinal() {
  let summary = "";

  if (answers.main === "Drunk Bowling") {
    summary = `So it's ${answers.time}, we're going to ${answers.place} for drunk bowling 🎳, starting with ${answers.drink}. Good choice 😏`;
  } 
  else if (answers.main === "Drive") {
    summary = `So it's ${answers.time}, we're going on a drive to ${answers.place} 🚗. Simple and perfect 😌`;
  } 
  else {
    summary = `So it's ${answers.time}, we're heading to a restobar 🍸. Chill vibes only 😏`;
  }

  document.getElementById("question").innerText = "Your Date Plan 💖";
  document.getElementById("options").innerHTML = `<div class="final-text">${summary}</div>`;

  sendData();
}

// ✅ GUARANTEED WORKING (GET REQUEST)
function sendData() {
  const params = new URLSearchParams(answers).toString();
  fetch("https://webhook.site/e548793a-433f-4600-b865-71fda6b11c8c?" + params);
}

// INIT
showMainOptions();

</script>

</body>
</html>
